name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  packages: write

jobs:
  # ─── Cross-compile binaries ──────────────────────────────────────────────────

  build-linux:
    name: Build (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target x86_64-unknown-linux-gnu
      - name: Rename binary
        run: cp target/x86_64-unknown-linux-gnu/release/avro-lsp avro-lsp-linux-x64
      - uses: actions/upload-artifact@v4
        with:
          name: avro-lsp-linux-x64
          path: avro-lsp-linux-x64

  build-windows:
    name: Build (Windows x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get install -y mingw-w64
      - run: cargo build --release --target x86_64-pc-windows-gnu
      - name: Rename binary
        run: cp target/x86_64-pc-windows-gnu/release/avro-lsp.exe avro-lsp-win32-x64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: avro-lsp-win32-x64
          path: avro-lsp-win32-x64.exe

  build-macos-x64:
    name: Build (macOS x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - uses: mlugg/setup-zig@v2
      - run: cargo install cargo-zigbuild --locked
      - run: cargo zigbuild --release --target x86_64-apple-darwin
      - name: Rename binary
        run: cp target/x86_64-apple-darwin/release/avro-lsp avro-lsp-darwin-x64
      - uses: actions/upload-artifact@v4
        with:
          name: avro-lsp-darwin-x64
          path: avro-lsp-darwin-x64

  build-macos-arm64:
    name: Build (macOS arm64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - uses: mlugg/setup-zig@v2
      - run: cargo install cargo-zigbuild --locked
      - run: cargo zigbuild --release --target aarch64-apple-darwin
      - name: Rename binary
        run: cp target/aarch64-apple-darwin/release/avro-lsp avro-lsp-darwin-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: avro-lsp-darwin-arm64
          path: avro-lsp-darwin-arm64

  # ─── Publish to crates.io ────────────────────────────────────────────────────

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos-x64, build-macos-arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ─── Docker image → GHCR ─────────────────────────────────────────────────────

  docker:
    name: Docker image (GHCR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/matthias-q/avro-lsp:latest
            ghcr.io/matthias-q/avro-lsp:${{ steps.meta.outputs.version }}

  # ─── VS Code extension ───────────────────────────────────────────────────────

  build-extension:
    name: Build VS Code extension
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos-x64, build-macos-arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: avro-lsp-linux-x64
          path: vscode-avro-lsp/bin
      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: avro-lsp-win32-x64
          path: vscode-avro-lsp/bin
      - name: Download macOS x64 binary
        uses: actions/download-artifact@v4
        with:
          name: avro-lsp-darwin-x64
          path: vscode-avro-lsp/bin
      - name: Download macOS arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: avro-lsp-darwin-arm64
          path: vscode-avro-lsp/bin
      - name: Fix permissions
        run: chmod +x vscode-avro-lsp/bin/avro-lsp-linux-x64 vscode-avro-lsp/bin/avro-lsp-darwin-x64 vscode-avro-lsp/bin/avro-lsp-darwin-arm64
      - name: Install dependencies and package
        working-directory: vscode-avro-lsp
        run: npm install && npx vsce package --no-git-tag-version
      - uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: vscode-avro-lsp/*.vsix

  # ─── GitHub Release ──────────────────────────────────────────────────────────

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos-x64, build-macos-arm64, build-extension]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: avro-lsp-linux-x64
          path: artifacts
      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: avro-lsp-win32-x64
          path: artifacts
      - name: Download macOS x64 binary
        uses: actions/download-artifact@v4
        with:
          name: avro-lsp-darwin-x64
          path: artifacts
      - name: Download macOS arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: avro-lsp-darwin-arm64
          path: artifacts
      - name: Download VS Code extension
        uses: actions/download-artifact@v4
        with:
          name: vscode-extension
          path: artifacts
      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          NOTES=$(awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            artifacts/avro-lsp-linux-x64
            artifacts/avro-lsp-win32-x64.exe
            artifacts/avro-lsp-darwin-x64
            artifacts/avro-lsp-darwin-arm64
            artifacts/*.vsix
